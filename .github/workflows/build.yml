name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📱 构建 IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔧 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean --no-install

      - name: 📦 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🔍 查看 Xcode 版本
        run: |
          xcodebuild -version
          xcode-select -p  # ✅ 这里已修复

      # ========================
      # 标准构建流程
      # ========================
      - name: 🏗️ Archive 构建
        run: |
          cd ios
          xcodebuild archive -workspace BookReader.xcworkspace \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/BookReader.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 📦 打包 IPA
        run: |
          cd ios
          APP_PATH="build/BookReader.xcarchive/Products/Applications/BookReader.app"
          echo "✅ 找到 App: $APP_PATH"

          # 打包标准 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry BookReader.ipa Payload/
          mv BookReader.ipa ../

      - name: 📤 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: BookReader.ipa
          retention-days: 90