name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📱 构建 IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      # ====== 关键修复：切换到兼容的 Xcode 版本 ======
      - name: 🔧 选择 Xcode 16.1（避免 16.4 的 Swift 6.1 兼容问题）
        run: |
          echo "📋 所有可用的 Xcode 版本："
          ls -d /Applications/Xcode*.app

          # 按优先级选择：16.1 > 16.2 > 16.3（不要 16.4）
          for ver in 16.1 16.2 16.3; do
            APP="/Applications/Xcode_${ver}.app"
            if [ -d "$APP" ]; then
              sudo xcode-select -s "$APP/Contents/Developer"
              echo "✅ 已切换到 Xcode ${ver}"
              break
            fi
          done

          echo ""
          echo "当前 Xcode 版本："
          xcodebuild -version
          swift --version

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 安装依赖
        run: |
          # 删除旧锁文件，确保拉到兼容版本
          rm -f package-lock.json
          npm install
          npm install expo@latest
          npx expo install --fix

      - name: 🔧 生成 iOS 原生工程
        run: |
          # 清掉旧的 ios 目录重新生成
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: 📦 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🏗️ 编译
        run: |
          set -eo pipefail
          cd ios

          xcodebuild build \
            -workspace BookReader.xcworkspace \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee ../build.log

      - name: 📦 打包 IPA
        run: |
          set -eo pipefail
          cd ios

          APP_PATH="derived_data/Build/Products/Release-iphoneos/BookReader.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 找不到 BookReader.app，正在搜索..."
            find derived_data -name "*.app" -type d 2>/dev/null
            tail -50 ../build.log
            exit 1
          fi

          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "❌ Info.plist 不存在"
            exit 1
          fi

          echo "✅ 找到 App: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry BookReader.ipa Payload/
          mv BookReader.ipa ../

          echo "✅ IPA 打包成功！大小："
          ls -lh ../BookReader.ipa

      - name: 📋 失败时显示日志
        if: failure()
        run: |
          if [ -f build.log ]; then
            echo "===== 搜索 Swift 编译错误 ====="
            grep -n "error:" build.log | head -30
            echo ""
            echo "===== 日志末尾 ====="
            tail -100 build.log
          else
            echo "没有编译日志"
          fi

      - name: 📤 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: BookReader.ipa
          retention-days: 90