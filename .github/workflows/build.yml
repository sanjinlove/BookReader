name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📱 构建 IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔧 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean --no-install

      - name: 📦 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🔍 查看 Xcode 版本
        run: |
          xcodebuild -version
          xcodeselect -p

      # ========================
      # ✅ 修复：正确构建流程 archive + export
      # ========================
      - name: 🏗️ Archive 构建
        run: |
          cd ios
          xcodebuild archive -workspace BookReader.xcworkspace \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/BookReader.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: 📤 Export 导出无签名 IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/BookReader.xcarchive \
            -exportPath build/IPA \
            -exportOptionsPlist <(echo '{"method":"ad-hoc","signingStyle":"manual"}') \
            CODE_SIGNING_ALLOWED=NO

      # ========================
      # ✅ 修复：自动获取正确的 .app 路径
      # ========================
      - name: 📦 打包最终 IPA
        run: |
          cd ios
          APP_PATH=$(find build/BookReader.xcarchive/Products/Applications -name "BookReader.app" | head -1)
          echo "✅ 找到正确的 App: $APP_PATH"

          ls -la "$APP_PATH"
          ls -la "$APP_PATH/Info.plist" # 一定会存在

          # 打包标准 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry BookReader.ipa Payload/
          mv BookReader.ipa ../

      - name: 📤 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: BookReader.ipa
          retention-days: 90