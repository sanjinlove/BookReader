name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📱 构建 IPA
    # 🌟 关键：退回 macos-14，使用极其稳定的 Xcode 15.4
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔧 强制降级到稳定的 Expo 51 (避开新版的所有 Bug)
        run: |
          # 自动修改 package.json 中的版本号
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.dependencies['expo'] = '~51.0.28';
            pkg.dependencies['react-native'] = '0.74.5';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # 清除所有可能的缓存干扰
          rm -rf package-lock.json node_modules ios
          npm install
          
          # 让 expo 自动把其他所有插件对齐到 51 兼容的版本
          npx expo install --fix

      - name: 🔧 生成 iOS 原生工程
        run: |
          npx expo prebuild --platform ios --clean --no-install

      - name: 📦 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🏗️ 编译 (Xcode 15.4 稳定环境)
        run: |
          set -eo pipefail
          cd ios

          xcodebuild build \
            -workspace BookReader.xcworkspace \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee ../build.log

      - name: 📦 打包 IPA
        run: |
          set -eo pipefail
          cd ios

          APP_PATH="derived_data/Build/Products/Release-iphoneos/BookReader.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 找不到 BookReader.app，编译可能还是失败了"
            exit 1
          fi

          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "❌ Info.plist 不存在"
            exit 1
          fi

          echo "✅ 找到 App: $APP_PATH"

          # 执行打包
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry BookReader.ipa Payload/
          mv BookReader.ipa ../

          echo "✅ IPA 打包成功！大小："
          ls -lh ../BookReader.ipa

      - name: 📤 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: BookReader.ipa
          retention-days: 90