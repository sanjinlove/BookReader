name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📱 构建 IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 安装依赖
        run: npm ci

      - name: 🔧 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --clean --no-install

      - name: 📦 安装 CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: 🏗️ 编译 (使用 DerivedData 避免破坏模块路径)
        run: |
          set -eo pipefail
          cd ios

          # 使用 -derivedDataPath 指定完整的构建沙盒，避免打乱 Pods 的相对路径
          xcodebuild build \
            -workspace BookReader.xcworkspace \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee ../build.log

      - name: 📦 打包 IPA
        run: |
          set -eo pipefail
          cd ios

          # 现在的路径在我们指定的 derived_data 里面
          APP_PATH="derived_data/Build/Products/Release-iphoneos/BookReader.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 找不到 BookReader.app，正在全局搜索..."
            find derived_data -name "*.app" -type d
            echo ""
            echo "===== 日志末尾 ====="
            tail -50 ../build.log
            exit 1
          fi

          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "❌ Info.plist 不存在"
            exit 1
          fi

          echo "✅ 成功找到 App: $APP_PATH"
          
          # 打包
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry BookReader.ipa Payload/
          mv BookReader.ipa ../

          echo "✅ IPA 打包成功！大小："
          ls -lh ../BookReader.ipa

      - name: 📋 失败时显示日志
        if: failure()
        run: |
          echo "===== 编译错误日志 ====="
          tail -200 build.log 2>/dev/null || echo "没有日志"

      - name: 📤 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: BookReader.ipa
          retention-days: 90